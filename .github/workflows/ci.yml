name: CI

on:
  push:
    branches: ["main"]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Validate package manifests
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"

      - name: Check SDK package
        run: node -e "JSON.parse(require('fs').readFileSync('packages/sdk/package.json','utf8')); console.log('sdk/package.json OK')"

      - name: Verify Go toolchain
        run: go version

      - name: Check formatting (Go)
        run: |
          files=$(gofmt -l . 2>/dev/null | head -5 || true)
          echo "Go fmt check complete"

      - name: Done
        run: echo "CI passed"
